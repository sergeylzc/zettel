  <h1>理解STP另一个角度</h1>
  <div><ul>
<li>按照不同维度拆分市场后，看看哪个细分市场还有机会，然后重点投入这个细分市场，这就形成了「目标市场」</li>
<li>然后长期耕耘这个「目标市场」，通过一系列特有的经营活动，为该市场的顾客匹配合适的供给，进一步形成了「市场定位」</li>
</ul>
