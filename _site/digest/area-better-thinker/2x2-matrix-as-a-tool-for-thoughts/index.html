  <h1>四象限思维工具</h1>
  <div><ul>
<li>出发点
<ul>
<li>世界本是复杂、多维的，但人却不太擅长进行多维度思考</li>
<li>很多时候多维的事物总被简化为单维，过于简化地看待世界</li>
</ul>
</li>
<li>作用
<ul>
<li>而四象限是二维思考工具，多出一个维度进行观察分析，世界往往也就变得清晰</li>
</ul>
</li>
<li>实践
<ul>
<li>决策管理：长期和短期</li>
<li>能力圈：主观认识和客观认识（认识知道和不知道）</li>
<li>需求分析：人群大小和需求刚性</li>
<li>时间管理：重要和紧急</li>
<li>员工考察：意愿和能力</li>
<li>etc</li>
</ul>
</li>
</ul>
